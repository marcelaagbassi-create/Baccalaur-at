<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4db6ac;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#80cbc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd54f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bf953f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fcf6ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa771c;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="80" fill="#f4ece1" stroke="url(#borderGradient)" stroke-width="15" />

  <text x="50%" y="280" font-family="serif" font-weight="bold" font-size="280" text-anchor="middle" fill="url(#goldGradient)" filter="url(#shadow)" style="stroke:#8b6b23; stroke-width:2;">B</text>

  <text x="50%" y="420" font-family="serif" font-weight="bold" font-size="42" text-anchor="middle" fill="#5d4037" letter-spacing="2">BACCALAUREATS</text>
</svg>
